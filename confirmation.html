<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nuit au Zénith - Confirmation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>
    <div class="parallax-bg">
        <div class="particles"></div>
        <div class="bubbles"></div>
    </div>
    <header>
        <h1 class="main-title">LA NUIT AU ZÉNITH</h1>
    </header>
    <main>
        <section class="confirmation-section">
            <div class="check-icon">✓</div>
            <h2>Votre réservation a bien été enregistrée.</h2>
            <p>Merci pour votre intérêt pour La Nuit au Zénith.<br>
            Votre demande a été envoyée avec succès.<br>
            Vous recevrez une confirmation très prochainement.<br>
            Préparez-vous pour une soirée exceptionnelle, élégante et mémorable.</p>
            <div class="buttons">
                <button class="btn menu-btn" onclick="goToMenu()">Voir le menu de la soirée</button>
                <button class="btn home-btn" onclick="goHome()">Retour à l’accueil</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
